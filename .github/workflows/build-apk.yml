name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type: debug or release'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Source code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java (required by Gradle / Android SDK) ────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Dependency cache ───────────────────────────────────────────────
      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Install JS dependencies ────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 7. Generate native Android project ───────────────────────────────
      - name: Run expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install --clean
        env:
          # Prevents interactive prompts during prebuild
          CI: '1'

      # ── 8a. Build DEBUG APK ───────────────────────────────────────────────
      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 8b. (Optional) Decode keystore ───────────────────────────────────
      - name: Decode keystore
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # ── 8c. Build RELEASE APK ─────────────────────────────────────────────
      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        # Pass signing config via Gradle properties to avoid writing secrets to disk
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PMYAPP_UPLOAD_STORE_FILE=release.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD="${{ secrets.STORE_PASSWORD }}" \
            -PMYAPP_UPLOAD_KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PMYAPP_UPLOAD_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      # ── 9. Collect APK ────────────────────────────────────────────────────
      - name: Locate APK
        id: find_apk
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          else
            APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      # ── 10. Upload APK as artifact ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-for-android-${{ github.event.inputs.build_type }}-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7
